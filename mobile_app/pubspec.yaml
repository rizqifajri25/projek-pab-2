name: padel_finder_mobile
version: 1.0.0+1
publish_to: none
description: Mobile app PadelFinder untuk mencari dan berbagi lapangan padel di Palembang.
environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^5.6.0
  firebase_auth: ^5.3.0
  firebase_core: ^3.9.0
  flutter_local_notifications: ^18.0.1
  flutter_map: ^7.0.2
  flutter_riverpod: ^2.6.1
  geolocator: ^13.0.2
  go_router: ^14.6.2
  image_picker: ^1.1.2
  intl: ^0.20.1
  latlong2: ^0.9.1
  uuid: ^4.5.1
  http: ^1.2.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
