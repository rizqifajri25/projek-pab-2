publish_to: none
description: Flutter Web Admin Panel untuk moderasi PadelFinder.
environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^5.6.0
  firebase_auth: ^5.3.0
  firebase_core: ^3.9.0
  firebase_storage: ^12.3.0
  fl_chart: ^0.70.2
